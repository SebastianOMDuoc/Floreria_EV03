spring.application.name=ms-productos
server.port=8082

# Conexión a Eureka apuntando al contenedor de docker
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://mysql:3306/db_productos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.root=INFO
logging.level.com.floreria.ms_productos=DEBUG

springdoc.api-docs.path=/productos/v3/api-docs
#springdoc.api-docs.path=/api-docs
#springdoc.swagger-ui.path=/swagger-ui.html