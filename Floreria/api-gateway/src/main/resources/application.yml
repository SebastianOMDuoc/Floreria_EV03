server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ms_productos
          uri: lb://ms-productos
          predicates:
            - Path=/api/productos/**

        - id: ms_categorias
          uri: lb://ms-categorias
          predicates:
            - Path=/api/categorias/**

        - id: ms_alertas
          uri: lb://ms-alertas
          predicates:
            - Path=/api/alertas/**

        - id: ms_clientes
          uri: lb://ms-clientes
          predicates:
            - Path=/api/clientes/**

        - id: ms_compras
          uri: lb://ms-compras
          predicates:
            - Path=/api/compras/**

        - id: ms_despachos
          uri: lb://ms-despachos
          predicates:
            - Path=/api/despachos/**

        - id: ms_empleados
          uri: lb://ms-empleados
          predicates:
            - Path=/api/empleados/**

        - id: ms_inventario
          uri: lb://ms-inventario
          predicates:
            - Path=/api/inventario/**

        - id: ms_proveedores
          uri: lb://ms-proveedores
          predicates:
            - Path=/api/proveedores/**

        - id: ms_ventas
          uri: lb://ms-ventas
          predicates:
            - Path=/api/ventas/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
